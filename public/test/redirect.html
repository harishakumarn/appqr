<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0a0a0a;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <p>Redirecting...</p>
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        var d = params.get('d');
        if (!d) throw new Error('No data');

        // base64url → base64 → JSON
        var json = atob(d.replace(/-/g, '+').replace(/_/g, '/'));
        var urls = JSON.parse(json);

        var ua = navigator.userAgent;
        var target = /android/i.test(ua) ? urls.android : urls.ios;

        if (!target) throw new Error('No URL');
        window.location.replace(target);
      } catch (e) {
        document.querySelector('p').textContent = 'Invalid QR code. Please scan again.';
      }
    })();
  </script>
</body>
</html>
